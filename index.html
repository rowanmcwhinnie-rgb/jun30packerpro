function dayRange(s, e) {
  const out = [];
  const c = new Date(s + "T00:00:00");
  const l = new Date(e + "T00:00:00");
  while (c <= l) {
    out.push(c.toISOString().slice(0, 10));
    c.setDate(c.getDate() + 1);
  }
  return out;
}

// ← Replace this URL with your Railway backend URL after deploying
const AI_PROXY_URL = "https://rp-backend-production-267b.up.railway.app/api/ai";
const AI_HEADERS = {"Content-Type": "application/json"};
const AI_MODEL = "claude-sonnet-4-6";
async function aiPost(body) {
  const r = await fetch(AI_PROXY_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      model: AI_MODEL,
      ...body
    })
  });
  if (!r.ok) throw new Error(`API error ${r.status}`);
  const d = await r.json();
  const text = (d.content || []).map(b => b.text || "").join("");
  const cleaned = text.replace(/```json|```/g, "").trim();
  try {
    return JSON.parse(cleaned);
  } catch (e) {
    // Truncated response — try to salvage complete objects from a partial JSON array
    const daysMatch = cleaned.match(/"days"\s*:\s*(\[[\s\S]*)/);
    if (daysMatch) {
      const arrText = daysMatch[1];
      // Find all complete day objects
      const recovered = [];
      const objRe = /\{[^{}]*"day"\s*:[^{}]*\}/g;
      let m;
      while ((m = objRe.exec(arrText)) !== null) {
        try {
          recovered.push(JSON.parse(m[0]));
        } catch (_) {}
      }
      if (recovered.length > 0) return {
        days: recovered
      };
    }
    throw e;
  }
}

async function callAI(trip, wardrobe, styleBoard) {
  const itinS = trip.itin.map(d => `Day ${d.day}${d.date ? ` (${d.date})` : ""}${d.location ? ` @ ${d.location}` : ""}: ${(d.activities || []).join(", ") || "Free day"}. Dress code: ${d.dresscode || "Casual"}.${d.outfitNote ? ` Note: ${d.outfitNote}` : ""}`).join("\n");
  const wardS = wardrobe.length ? wardrobe.map(w => `- ${w.name} (${w.cat})`).join("\n") : "No wardrobe items added yet.";
  const boardTags = styleBoard?.tags?.join(", ") || "";
  const boardPins = styleBoard?.pins?.filter(p => p.label).map(p => p.label).join(", ") || "";
  const vibeDesc = [trip.vibe, boardTags, boardPins].filter(Boolean).join(" | ");
  const prompt = `You are an expert personal stylist and travel packer. Create a highly curated packing list that perfectly matches this person's aesthetic and trip demands.

DESTINATION: ${trip.dest}
DATES: ${trip.start || "TBD"} to ${trip.end || "TBD"} (${trip.itin?.length || 1} days)
TRIP TYPE: ${trip.tripType || "Leisure"}
WEATHER/CLIMATE: ${trip.weather || `Research typical weather for ${trip.dest} this time of year and pack accordingly.`}
USER NOTES: ${trip.notes || "None"}

STYLE VIBE & AESTHETIC BOARD:
${vibeDesc || "classic, elevated, put-together"}
Every recommendation MUST reflect this aesthetic. Match silhouettes, color palette, and energy to their vibe. If minimalist: clean lines, neutrals, quiet luxury. If streetstyle: bold layers, statement pieces. If boho: flowy, textural, earthy.

ITINERARY:
${itinS}

THEIR WARDROBE:
${wardS}

INSTRUCTIONS:
- Create one group per distinct occasion/activity (e.g. "Fine Dining Looks", "Beach Days", "Content Shoot", "Travel Day")
- Pull EXACT item names from wardrobe when they fit the vibe + occasion
- For missing items, be SPECIFIC and on-brand (e.g. "Wide-leg cream linen trousers" not just "trousers")
- Styling tips must sound like their personal stylist — reference their vibe and destination
- Consider destination climate in every suggestion
- overallTip: one strategic insight about packing for their specific destination + aesthetic combo

Return ONLY valid JSON, no markdown:
{"groups":[{"title":"string","emoji":"emoji","occasion":"string","stylingTip":"personal stylist tip referencing their vibe","fromWardrobe":["exact wardrobe item name"],"toAdd":["specific on-brand item to add"]}],"overallTip":"strategic tip for their destination and aesthetic"}`;
  return aiPost({
    max_tokens: 4000,
    messages: [{
      role: "user",
      content: prompt
    }]
  });
}

  items,
  tripDays,
  tripDest,
  imageBase64,
  cubes
}) {
  const itemList = items.map(i => `- ${i.name} (${i.cat})`).join("\n");
  const suitInfo = SUITCASE_TYPES.find(s => s.id === suitcaseType) || SUITCASE_TYPES[0];
  const cubeSection = cubes && cubes.length > 0 ? `PACKING CUBES AVAILABLE (${cubes.length} total):
The user has these specific packing cubes:
${cubes.map((c, i) => {
    const dims = c.size === "xs" ? '11×7×3"' : c.size === "small" ? '13×10×4"' : c.size === "medium" ? '16×11×5"' : c.size === "large" ? '18×13×6"' : '22×14×7"';
    return `- Cube ${i + 1}: ${c.size} (${dims})${c.label ? ` — labelled "${c.label}"` : ""}${c.color ? ` [colour: ${c.color}]` : ""}`;
  }).join("\n")}

For EACH cube:
1. List exactly which items go inside it (be specific — match item names from the list)
2. HOW to pack items inside that cube: roll vs fold, orientation, layering order
3. Whether to compress the cube before closing
4. EXACTLY where in the suitcase this cube should go (bottom-left, bottom-right, middle, on top, lid pocket, etc.)
5. Rationale: why these items go together

In the zones array, each cube should be its own zone entry with cubeLabel matching e.g. "Cube 1 — Tops (Medium)".` : `NO PACKING CUBES: Recommend zones by suitcase area (bottom layer, top layer, lid pocket, side pocket, etc.) instead. Be very specific about placement.`;
  const textPrompt = `You are a master packing strategist and professional travel organiser. Create an extremely detailed, practical, step-by-step packing plan.

SUITCASE: ${suitInfo.name} (${suitInfo.dims})
TRIP: ${tripDays} days to ${tripDest || "their destination"}

ITEMS TO PACK:
${itemList}

${cubeSection}

Give a zone-by-zone breakdown. Each zone should be either a specific packing cube (if they have them) or a suitcase area. For EVERY zone specify:
1. Exactly which items go in it
2. HOW to fold/roll/pack those items (specific technique)
3. The exact position in the suitcase (bottom/middle/top/lid/front pocket)
4. Any compression or space-saving tips specific to those items

Return ONLY valid JSON (no markdown):
{
  "suitcaseSummary": "one sentence assessing fit and feasibility",
  "spaceRating": 7,
  "zones": [
    {
      "zone": "Zone name e.g. Cube 1 — Tops & Bottoms or Bottom Layer",
      "emoji": "single emoji",
      "color": "#hex warm earth tone",
      "cubeLabel": "Cube 1 (Medium)" or null if not a cube,
      "suitcasePosition": "e.g. Bottom layer, left side",
      "items": ["exact item name"],
      "packingMethod": "how to fold/roll each item type in this zone",
      "tip": "specific actionable tip for this zone"
    }
  ],
  "loadingOrder": ["Step 1: ...", "Step 2: ...", "Step 3: ..."],
  "methodRecommendation": "roll",
  "wrinklePriority": ["item name"],
  "weightTip": "one specific tip about weight distribution",
  "spaceSaverTips": ["tip1", "tip2", "tip3"],
  "forgottenItems": ["commonly forgotten item relevant to this trip"]
}`;
  const messages = imageBase64 ? [{
    role: "user",
    content: [{
      type: "image",
      source: {
        type: "base64",
        media_type: "image/jpeg",
        data: imageBase64
      }
    }, {
      type: "text",
      text: `This is a photo of the user's suitcase. Analyse the bag type, space, and any visible items, then give packing strategy.\n\n${textPrompt}`
    }]
  }] : [{
    role: "user",
    content: textPrompt
  }];
  return aiPost({
    max_tokens: 4000,
    messages
  });
}

      color: stylistInput.trim() ? "var(--cr)" : "var(--t)",
      fontSize: 18,
      cursor: stylistInput.trim() ? "pointer" : "default",
      display: "flex",
      alignItems: "center",
      justifyContent: "center",
      flexShrink: 0,
      transition: "all .2s"
    }
  }, "↑")))));
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
